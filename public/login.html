<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convo — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <div class="auth-bg"></div>
  <div class="auth-card">
    <div class="auth-logo">Convo</div>
    <p class="auth-sub">Your private space.</p>
    <form id="loginForm">
      <div class="field">
        <label>Username</label>
        <input type="text" id="loginUsername" placeholder="Enter username" required autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div id="loginMsg" class="msg"></div>
      <button type="submit" class="btn-auth">Sign In</button>
    </form>
    <p class="auth-link">New here? <a href="/register.html">Create account</a></p>
  </div>
  <script src="auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convo - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth.css">
  <script>
    if (localStorage.getItem('convo-theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
</head>
<body>
  <div class="auth-shell">
    <div class="auth-panel">
      <div class="auth-topbar">
        <div>
          <p class="auth-eyebrow">Private Social Space</p>
          <div class="auth-logo">Convo</div>
        </div>
        <button id="themeToggle" class="theme-btn" type="button" aria-label="Toggle theme">◐</button>
      </div>

      <div class="auth-copy">
        <h1>Sign in to your space</h1>
        <p>Same app behavior, redesigned in your white-blue and blue-black theme.</p>
      </div>

      <form id="loginForm">
        <div class="field">
          <label>Username</label>
          <input type="text" id="loginUsername" placeholder="Enter username" required autocomplete="username">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" required autocomplete="current-password">
        </div>
        <div id="loginMsg" class="msg"></div>
        <button type="submit" class="btn-auth">Sign In</button>
      </form>

      <p class="auth-link">New here? <a href="/register.html">Create account</a></p>
    </div>
  </div>
  <script src="auth.js"></script>
</body>
</html>
